<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brasil — Inteligência de Mercado | Demografia, Renda e Potencial de Investimento</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
:root{
  --bg:#0a0e17;--surface:#111827;--surface2:#131a2e;--border:#1e2a45;--border2:#2a3555;
  --text:#e0e6f0;--text2:#8a9aba;--text3:#5a6a8a;--text4:#3a4a6a;
  --green:#4ade80;--green2:#16a34a;--cyan:#22d3ee;--red:#ef4444;--orange:#f97316;--blue:#3b82f6;
  --ng-orange:#FF6B00;--ng-blue:#0066CC;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
#map{position:absolute;top:56px;left:0;right:0;bottom:0;z-index:1;background:var(--bg)}
.leaflet-container{background:var(--bg)!important}
.leaflet-control-zoom{border:none!important}
.leaflet-control-zoom a{background:var(--surface2)!important;color:var(--text2)!important;border:1px solid var(--border)!important;width:32px!important;height:32px!important;line-height:32px!important;font-size:16px!important}
.leaflet-control-zoom a:hover{background:#253050!important;color:#a0b0e0!important}
.leaflet-control-attribution{display:none!important}

/* Header Bar */
#header{position:fixed;top:0;left:0;right:0;z-index:1100;height:56px;
  background:linear-gradient(135deg,#0d1321 0%,#131a2e 100%);
  border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px}
#header .logo{display:flex;align-items:center;gap:10px;min-width:fit-content}
#header .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--ng-orange),var(--ng-blue));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff}
#header h1{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap}
#header h1 span{color:var(--text3);font-weight:400;font-size:12px}
.header-sep{width:1px;height:28px;background:var(--border);margin:0 4px}

/* Mode Tabs */
#mode-tabs{display:flex;gap:2px;background:var(--surface);border-radius:8px;padding:3px;border:1px solid var(--border)}
.mode-tab{padding:6px 12px;font-size:10.5px;font-weight:500;cursor:pointer;border-radius:6px;
  color:var(--text3);border:none;background:transparent;font-family:inherit;letter-spacing:.2px;transition:all .2s;white-space:nowrap}
.mode-tab.active{background:linear-gradient(135deg,rgba(255,107,0,.15),rgba(0,102,204,.15));color:var(--ng-orange);font-weight:600}
.mode-tab:hover:not(.active){color:var(--text2);background:rgba(255,255,255,.03)}

/* Header right */
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.hdr-btn{padding:6px 14px;font-size:11px;font-weight:500;cursor:pointer;border-radius:6px;
  color:var(--text3);border:1px solid var(--border);background:var(--surface);font-family:inherit;transition:all .2s}
.hdr-btn:hover{color:var(--text);border-color:var(--border2)}
.hdr-btn.primary{background:linear-gradient(135deg,var(--ng-orange),#e55a00);color:#fff;border:none}
.hdr-btn.primary:hover{filter:brightness(1.1)}

/* Breadcrumb */
#breadcrumb{position:absolute;top:64px;left:16px;z-index:1000;display:flex;gap:6px;align-items:center;font-size:11px}
#breadcrumb span{color:var(--text3);cursor:pointer;transition:color .2s}
#breadcrumb span:hover{color:var(--green)}
#breadcrumb span.active{color:var(--text);cursor:default}
#breadcrumb .sep{color:var(--border2);cursor:default;font-size:10px}

/* Right Panel */
#right-panel{position:absolute;top:56px;right:0;bottom:80px;width:360px;z-index:1000;
  background:rgba(17,24,39,.96);border-left:1px solid var(--border);
  backdrop-filter:blur(16px);overflow-y:auto;transition:transform .3s ease;display:flex;flex-direction:column}
#right-panel.collapsed{transform:translateX(100%)}
#panel-toggle{position:absolute;top:50%;right:360px;z-index:1001;transform:translateY(-50%);
  background:var(--surface2);border:1px solid var(--border);border-right:none;
  border-radius:8px 0 0 8px;padding:8px 4px;cursor:pointer;color:var(--text3);font-size:14px;transition:all .2s}
#panel-toggle:hover{color:var(--text);background:#1a2a45}
#right-panel.collapsed~#panel-toggle{right:0}

.panel-section{padding:16px;border-bottom:1px solid var(--border)}
.panel-section h3{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.panel-section h3 .badge{background:var(--ng-orange);color:#fff;font-size:9px;padding:2px 6px;border-radius:10px;font-weight:600}

/* Filters */
.filter-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.filter-row label{font-size:10px;color:var(--text3);min-width:70px}
.filter-row input[type=number]{width:90px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:11px;color:var(--text);font-family:inherit}
.filter-row input[type=number]:focus{outline:none;border-color:var(--ng-orange)}

/* Rankings */
.rank-list{list-style:none;font-size:12px}
.rank-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(30,42,69,.5)}
.rank-item:hover{background:rgba(255,107,0,.08)}
.rank-item .rank-num{font-size:10px;font-weight:700;color:var(--text3);min-width:20px;text-align:center}
.rank-item .rank-num.top3{color:var(--ng-orange)}
.rank-item .rank-name{flex:1;font-weight:500;color:var(--text);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-item .rank-val{font-size:11px;font-weight:600;color:var(--text2);text-align:right;min-width:60px}
.rank-item .rank-growth{font-size:10px;min-width:50px;text-align:right;font-weight:600}
.rank-growth.pos{color:var(--green)}.rank-growth.neg{color:var(--red)}
.rank-item .rank-score{font-size:9px;background:rgba(255,107,0,.15);color:var(--ng-orange);padding:2px 6px;border-radius:8px;font-weight:600;min-width:36px;text-align:center}

/* Comparison */
#comparison{display:none}
#comparison.visible{display:block}
.compare-grid{display:flex;gap:8px;flex-wrap:wrap}
.compare-card{flex:1;min-width:100px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:11px}
.compare-card h4{font-size:11px;font-weight:600;color:var(--ng-orange);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.compare-card .cstat{display:flex;justify-content:space-between;padding:2px 0;font-size:10px;color:var(--text3)}
.compare-card .cstat .cv{color:var(--text);font-weight:500}
.compare-card canvas{width:100%;height:60px;margin-top:6px}
.compare-remove{float:right;cursor:pointer;color:var(--text4);font-size:12px}
.compare-remove:hover{color:var(--red)}

/* Insights */
#insights-panel{background:rgba(255,107,0,.04);border:1px solid rgba(255,107,0,.15);border-radius:8px;padding:12px;margin:8px 0}
#insights-panel h4{font-size:11px;font-weight:700;color:var(--ng-orange);margin-bottom:8px}
#insights-text{font-size:11px;color:var(--text2);line-height:1.6}
#insights-text strong{color:var(--text)}

/* Timeline */
#timeline{position:fixed;bottom:0;left:0;right:0;z-index:1000;height:80px;
  background:linear-gradient(0deg,rgba(10,14,23,.98) 0%,rgba(10,14,23,.92) 70%,rgba(10,14,23,0) 100%);
  padding:12px 24px 14px;display:flex;align-items:center;gap:16px}
#timeline-left{display:flex;align-items:center;gap:12px}
#year-display{font-size:28px;font-weight:800;min-width:60px;
  background:linear-gradient(135deg,var(--ng-orange),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#year-sub{font-size:10px;color:var(--text3);min-width:80px}
#play-btn{background:var(--surface2);border:1px solid var(--border);border-radius:50%;width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:var(--text3);flex-shrink:0}
#play-btn:hover{background:#1a2a45;color:var(--green);border-color:#2a4a3a}
#play-btn svg{width:14px;height:14px;fill:currentColor}
#slider-wrap{flex:1;display:flex;flex-direction:column}
#year-slider{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;outline:none;
  background:linear-gradient(90deg,#1a3a2a,var(--border2),#3a2a2a);cursor:pointer}
#year-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:linear-gradient(135deg,var(--ng-orange),var(--cyan));cursor:pointer;box-shadow:0 0 16px rgba(255,107,0,.4)}
#year-slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--ng-orange),var(--cyan));cursor:pointer}
#tick-marks{display:flex;justify-content:space-between;margin-top:4px}
#tick-marks span{font-size:9px;color:var(--text4);cursor:pointer;transition:color .2s;user-select:none}
#tick-marks span:hover{color:var(--text2)}
#tick-marks span.census{color:#5a7a6a;font-weight:600}
#tick-marks span.projected{color:#4a3a5a;font-style:italic}

/* Legend */
#legend{position:absolute;bottom:92px;left:16px;z-index:1000;background:rgba(19,26,46,.92);
  border:1px solid var(--border);border-radius:10px;padding:12px 14px;min-width:170px;backdrop-filter:blur(12px)}
#legend h3{font-size:10px;font-weight:600;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.8px}
#legend-gradient{height:10px;border-radius:3px;margin-bottom:4px}
#legend-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--text3)}
#legend-mode{font-size:10px;color:var(--ng-orange);margin-top:6px;text-align:center}

/* Info Panel (hover) */
#info-panel{position:absolute;bottom:92px;left:16px;z-index:1001;background:rgba(19,26,46,.95);
  border:1px solid var(--border);border-radius:10px;padding:14px 18px;min-width:250px;max-width:300px;
  backdrop-filter:blur(12px);transition:all .25s;opacity:0;transform:translateY(8px);pointer-events:none}
#info-panel.visible{opacity:1;transform:translateY(0);pointer-events:auto}
#info-panel h3{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text)}
.stat{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(30,42,69,.5);font-size:11px}
.stat:last-child{border:none}
.stat .label{color:var(--text3)}
.stat .value{font-weight:600;color:var(--text2)}
.stat .value.positive{color:var(--green)}
.stat .value.negative{color:var(--red)}
#click-hint{font-size:9px;color:var(--text4);margin-top:6px;text-align:center;font-style:italic}

/* Tooltip */
.map-tooltip{background:rgba(19,26,46,.95)!important;border:1px solid var(--border2)!important;
  border-radius:8px!important;padding:10px 14px!important;font-family:'Inter',sans-serif!important;
  font-size:12px!important;color:var(--text)!important;box-shadow:0 8px 32px rgba(0,0,0,.5)!important}
.map-tooltip .tt-name{font-weight:600;font-size:13px;margin-bottom:6px}
.map-tooltip .tt-row{display:flex;justify-content:space-between;gap:16px;color:var(--text2);font-size:11px;padding:1px 0}
.map-tooltip .tt-val{font-weight:500;color:var(--text2)}
.map-tooltip .tt-change.pos{color:var(--green)}.map-tooltip .tt-change.neg{color:var(--red)}

/* Back button */
#back-btn{position:absolute;top:64px;left:16px;z-index:1000;
  background:rgba(19,26,46,.9);border:1px solid var(--border);border-radius:8px;padding:5px 12px;
  font-size:11px;color:var(--text3);cursor:pointer;font-family:inherit;transition:all .2s;display:none}
#back-btn:hover{color:var(--green);border-color:#2a4a3a}

/* Loading */
#loading{position:fixed;top:0;left:0;right:0;bottom:0;z-index:2000;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s}
#loading.hidden{opacity:0;pointer-events:none}
.spinner{width:40px;height:40px;border:3px solid #1a2a45;border-top-color:var(--ng-orange);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{margin-top:12px;color:var(--text3);font-size:13px}
#loading .progress{color:var(--ng-orange);font-size:11px;margin-top:4px}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border2)}

/* Responsive when panel open */
#right-panel:not(.collapsed)~#map{right:360px}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>Carregando dados e mapa...</p><div class="progress" id="load-progress"></div></div>

<!-- HEADER -->
<div id="header">
  <div class="logo">
    <div class="logo-icon">BI</div>
    <h1>Brasil — Inteligência de Mercado <span>| Demografia, Renda e Potencial</span></h1>
  </div>
  <div class="header-sep"></div>
  <div id="mode-tabs">
    <button class="mode-tab active" data-mode="population" onclick="setMode('population')">👥 População</button>
    <button class="mode-tab" data-mode="income" onclick="setMode('income')">💰 Renda</button>
    <button class="mode-tab" data-mode="households" onclick="setMode('households')">🏠 Domicílios</button>
    <button class="mode-tab" data-mode="density" onclick="setMode('density')">📍 Densidade</button>
    <button class="mode-tab" data-mode="urbanization" onclick="setMode('urbanization')">🏙️ Urbanização</button>
    <button class="mode-tab" data-mode="potential" onclick="setMode('potential')">⭐ Potencial</button>
  </div>
  <div class="header-right">
    <button class="hdr-btn" onclick="exportCSV()">📥 Exportar CSV</button>
    <button class="hdr-btn" id="compare-toggle" onclick="toggleCompareMode()">⚖️ Comparar</button>
  </div>
</div>

<div id="breadcrumb"><span class="active">Brasil</span></div>
<button id="back-btn" onclick="goBack()">← Voltar</button>

<div id="map"></div>

<!-- INFO PANEL (hover) -->
<div id="info-panel">
  <h3 id="info-name"></h3>
  <div id="info-stats"></div>
  <div id="click-hint">Clique para explorar →</div>
</div>

<!-- LEGEND -->
<div id="legend">
  <h3>Variação</h3>
  <div id="legend-gradient" style="background:linear-gradient(90deg,#dc2626,#6b7280,#16a34a)"></div>
  <div id="legend-labels"><span>-30%</span><span>0%</span><span>+30%</span></div>
  <div id="legend-mode">População</div>
</div>

<!-- RIGHT PANEL -->
<div id="right-panel">
  <!-- Filters -->
  <div class="panel-section">
    <h3>🔎 Filtros</h3>
    <div class="filter-row"><label>Pop. mín (mil)</label><input type="number" id="flt-pop" value="0" min="0" onchange="updateRanking()"></div>
    <div class="filter-row"><label>Renda mín (R$)</label><input type="number" id="flt-inc" value="0" min="0" onchange="updateRanking()"></div>
    <div class="filter-row"><label>Cresc. mín (%)</label><input type="number" id="flt-growth" value="-999" step="0.1" onchange="updateRanking()"></div>
  </div>

  <!-- Rankings -->
  <div class="panel-section" style="flex:1;overflow-y:auto">
    <h3>🏆 Top Regiões <span class="badge" id="rank-count">27</span></h3>
    <ul class="rank-list" id="rank-list"></ul>
  </div>

  <!-- Comparison -->
  <div class="panel-section" id="comparison">
    <h3>⚖️ Comparação</h3>
    <div class="compare-grid" id="compare-grid"></div>
  </div>

  <!-- Insights -->
  <div class="panel-section">
    <h3>💡 Recomendações de Investimento</h3>
    <div id="insights-panel">
      <div id="insights-text">Carregando análise...</div>
    </div>
  </div>
</div>

<button id="panel-toggle" onclick="togglePanel()">◀</button>

<!-- TIMELINE -->
<div id="timeline">
  <div id="timeline-left">
    <div id="play-btn" onclick="togglePlay()" title="Animar timeline">
      <svg viewBox="0 0 24 24"><path id="play-icon" d="M8 5v14l11-7z"/></svg>
    </div>
    <div>
      <div id="year-display">2022</div>
      <div id="year-sub">Censo IBGE</div>
    </div>
  </div>
  <div id="slider-wrap">
    <input type="range" id="year-slider" min="1991" max="2052" value="2022" step="1">
    <div id="tick-marks"></div>
  </div>
</div>

const nameCache = {};

// ========== PROJECTION ENGINE ==========
function getCAGR(v1, v2, years) {
  if(v1 <= 0 || v2 <= 0) return 0;
  return Math.pow(v2/v1, 1/years) - 1;
}

function projectValue(data, year) {
  if(!data) return 0;
  if(data[year] !== undefined) return data[year];
  const years = censusYears.filter(y => data[y] !== undefined).sort((a,b)=>a-b);
  if(years.length < 2) return data[years[0]] || 0;
  if(year < years[0]) {
    const cagr = getCAGR(data[years[0]], data[years[1]], years[1]-years[0]);
    return data[years[0]] * Math.pow(1+cagr, year-years[0]);
  }
  const last = years[years.length-1], prev = years[years.length-2];
  const cagr = getCAGR(data[prev], data[last], last-prev);
  const yearsOut = year - last;
  const dampened = cagr * Math.pow(0.97, yearsOut/10);
  return data[last] * Math.pow(1+dampened, yearsOut);
}

function getPeriodChange(data, year) {
  if(!data) return 0;
  let refYear;
  if(year <= 1991) return 0;
  if(year <= 2000) refYear = 1991;
  else if(year <= 2010) refYear = 2000;
  else if(year <= 2022) refYear = 2010;
  else { refYear = year - 10; if(refYear < 1991) refYear = 1991; }
  const curr = projectValue(data, year);
  const ref = projectValue(data, refYear);
  return ((curr/ref - 1) * 100);
}

function getGrowthRate(data, year, horizon=10) {
  const curr = projectValue(data, year);
  const future = projectValue(data, year + horizon);
  if(curr <= 0) return 0;
  return ((future / curr - 1) * 100);
}

// ========== COMPOSITE POTENTIAL INDEX ==========
function calcPotential(d, year) {
  if(!d) return 0;
  const popGr = getGrowthRate(d.pop, year, 10);
  const incGr = getGrowthRate(d.inc, year, 10);
  const hhGr = getGrowthRate(d.hh, year, 10);
  const urbRate = projectValue(d.urb, year);
  // Weighted composite: household growth (35%), pop growth (25%), income growth (25%), urbanization (15%)
  const score = (hhGr * 0.35) + (popGr * 0.25) + (incGr * 0.25) + (urbRate * 0.15);
  return score;
}

// ========== METRIC HELPERS ==========
function getMetricValue(d, mode, year) {
  if(!d) return 0;
  switch(mode) {
    case 'population': return projectValue(d.pop, year);
    case 'income': return projectValue(d.inc, year);
    case 'households': return projectValue(d.hh, year);
    case 'density': return d.area ? (projectValue(d.pop, year) * 1000 / d.area) : 0;
    case 'urbanization': return projectValue(d.urb, year);
    case 'potential': return calcPotential(d, year);
    default: return 0;
  }
}

function getMetricChange(d, mode, year) {
  if(!d) return 0;
  switch(mode) {
    case 'population': return getPeriodChange(d.pop, year);
    case 'income': return getPeriodChange(d.inc, year);
    case 'households': return getPeriodChange(d.hh, year);
    case 'density': return getPeriodChange(d.pop, year); // density change = pop change
    case 'urbanization': return getPeriodChange(d.urb, year);
    case 'potential': return calcPotential(d, year); // absolute score used as "change"
    default: return 0;
  }
}

function formatMetric(val, mode) {
  switch(mode) {
    case 'population': return formatPop(val);
    case 'income': return 'R$ ' + formatNum(Math.round(val));
    case 'households': return formatPop(val);
    case 'density': return val.toFixed(1) + ' /km²';
    case 'urbanization': return val.toFixed(1) + '%';
    case 'potential': return val.toFixed(1) + ' pts';
    default: return String(val);
  }
}

const modeLabels = {
  population:'População', income:'PIB per capita', households:'Domicílios',
  density:'Densidade', urbanization:'Urbanização', potential:'Potencial de Mercado'
};

// ========== COLOR SCALE ==========
function getColor(pctChange) {
  let clamped, t;
  if(currentMode === 'potential') {
    // For potential: 0-50 range mapped to red→green
    clamped = Math.max(0, Math.min(50, pctChange));
    t = clamped / 50;
  } else if(currentMode === 'urbanization') {
    clamped = Math.max(40, Math.min(100, pctChange));
    t = (clamped - 40) / 60;
  } else if(currentMode === 'density') {
    clamped = Math.max(-30, Math.min(30, pctChange));
    t = (clamped + 30) / 60;
  } else {
    clamped = Math.max(-30, Math.min(30, pctChange));
    t = (clamped + 30) / 60;
  }
  if(t < 0.5) {
    const s = t / 0.5;
    const r = Math.round(220 - s * 110);
    const g = Math.round(38 + s * 62);
    const b = Math.round(38 + s * 52);
    return `rgb(${r},${g},${b})`;
  } else {
    const s = (t - 0.5) / 0.5;
    const r = Math.round(110 - s * 76);
    const g = Math.round(100 + s * 122);
    const b = Math.round(90 - s * 50);
    return `rgb(${r},${g},${b})`;
  }
}

function getStyle(feature) {
  const d = getFeatureData(feature);
  const change = getMetricChange(d, currentMode, currentYear);
  return {
    fillColor: getColor(change),
    weight: 1.2,
    color: '#1a2a45',
    fillOpacity: 0.82,
    opacity: 0.8
  };
}

function getHighlightStyle() {
  return {weight: 2.5, color: var_ng_orange || '#FF6B00', fillOpacity: 0.92};
}
var var_ng_orange = '#FF6B00';

function getFeatureId(feature) {
  const p = feature.properties;
  return p.codarea || p.CD_GCUF || p.coduf || p.CD_GCMUN || p.codmun || '';
}

function getFeatureName(feature) {
  const id = String(getFeatureId(feature));
  if(nameCache[id]) return nameCache[id];
  const p = feature.properties;
  return p.name || p.nome || p.NM_UF || p.NM_MUN || ('Região ' + id);
}

function hashCode(s) {
  let h = 0;
  for(let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

function getFeatureData(feature) {
  const id = String(getFeatureId(feature));
  const stId = parseInt(id.substring(0, 2));
  if(currentLevel === 'states' && stateData[stId]) return stateData[stId];
  const st = stateData[stId];
  if(!st) return null;
  const hash = hashCode(id);
  const variance = ((hash % 60) - 30) / 100;
  const popScale = 0.05 + (Math.abs(hash % 40)) / 100;
  const incScale = 0.8 + (hash % 40) / 100;
  const hhScale = popScale * (0.9 + (hash % 20) / 100);
  const urbAdj = ((hash % 20) - 10);
  return {
    name: getFeatureName(feature),
    area: st.area * popScale * 2,
    pop: Object.fromEntries(censusYears.map(y => [y, Math.round(st.pop[y] * popScale * (1 + variance * 0.3))])),
    inc: Object.fromEntries(censusYears.map(y => [y, Math.round(st.inc[y] * incScale * (1 + variance * 0.2))])),
    hh: Object.fromEntries(censusYears.map(y => [y, Math.round(st.hh[y] * hhScale * (1 + variance * 0.25))])),
    urb: Object.fromEntries(censusYears.map(y => [y, Math.max(20, Math.min(99, st.urb[y] + urbAdj))]))
  };
}

async function loadNames(level, parentId) {
  const base = 'https://servicodados.ibge.gov.br/api/v1/localidades';
  let url;
  if(level === 'meso') url = `${base}/estados/${parentId}/mesorregioes`;
  else if(level === 'micro') url = `${base}/estados/${parentId}/microrregioes`;
  else if(level === 'muni') url = `${base}/estados/${parentId}/municipios`;
  else return;
  try {
    const resp = await fetch(url);
    const data = await resp.json();
    data.forEach(item => { nameCache[String(item.id)] = item.nome; });
  } catch(e) { console.warn('Names load failed:', e); }
}

// ========== MAP SETUP ==========
function initMap() {
  map = L.map('map', {
    center: [-14.5, -53], zoom: 4, minZoom: 3, maxZoom: 12,
    zoomControl: true, attributionControl: false, preferCanvas: true
  });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {opacity: 0.3}).addTo(map);
}

// ========== GEOJSON LOADING ==========
const geoCache = {};

async function loadGeoJSON(level, parentId) {
  const key = `${level}_${parentId||'BR'}`;
  if(geoCache[key]) return geoCache[key];
  const fmt = '&formato=application/vnd.geo+json&qualidade=minima';
  const base = 'https://servicodados.ibge.gov.br/api/v3/malhas';
  let url;
  if(level === 'states') url = `${base}/paises/BR?intrarregiao=UF${fmt}`;
  else if(level === 'meso') url = `${base}/estados/${parentId}?intrarregiao=mesorregiao${fmt}`;
  else if(level === 'micro') url = `${base}/estados/${parentId}?intrarregiao=microrregiao${fmt}`;
  else if(level === 'muni') url = `${base}/estados/${parentId}?intrarregiao=municipio${fmt}`;
  setProgress(`Carregando ${level}...`);
  try {
    const resp = await fetch(url);
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    geoCache[key] = data;
    return data;
  } catch(e) {
    console.error('GeoJSON load error:', e);
    return null;
  }
}

// ========== RENDER MAP ==========
async function renderLevel(level, parentId, parentName) {
  showLoading();
  currentLevel = level;
  currentParentId = parentId;
  const [geo] = await Promise.all([
    loadGeoJSON(level, parentId),
    level !== 'states' ? loadNames(level, parentId) : Promise.resolve()
  ]);
  if(!geo) { hideLoading(); return; }
  if(geoLayer) map.removeLayer(geoLayer);
  geoLayer = L.geoJSON(geo, {
    style: getStyle,
    onEachFeature: (feature, layer) => {
      layer.on({
        mouseover: (e) => highlightFeature(e, feature),
        mouseout: resetHighlight,
        click: (e) => handleClick(feature, e)
      });
    }
  }).addTo(map);
  map.fitBounds(geoLayer.getBounds(), {padding: [60, 60], animate: true, duration: 0.8});
  updateBreadcrumb();
  updateBackButton();
  updateRanking();
  updateInsights();
  hideLoading();
}

function highlightFeature(e, feature) {
  e.target.setStyle(getHighlightStyle());
  e.target.bringToFront();
  showInfoPanel(feature);
  showTooltip(e, feature);
}

function resetHighlight(e) {
  if(geoLayer) geoLayer.resetStyle(e.target);
  hideInfoPanel();
}

function showTooltip(e, feature) {
  const d = getFeatureData(feature);
  if(!d) return;
  const pop = projectValue(d.pop, currentYear);
  const inc = projectValue(d.inc, currentYear);
  const hh = projectValue(d.hh, currentYear);
  const dens = d.area ? (pop * 1000 / d.area) : 0;
  const urbVal = projectValue(d.urb, currentYear);
  const pot = calcPotential(d, currentYear);
  const name = getFeatureName(feature);
  const popCh = getPeriodChange(d.pop, currentYear);
  const content = `
    <div class="tt-name">${name}</div>
    <div class="tt-row"><span>População</span><span class="tt-val">${formatPop(pop)}</span></div>
    <div class="tt-row"><span>Domicílios</span><span class="tt-val">${formatPop(hh)}</span></div>
    <div class="tt-row"><span>PIB p/c</span><span class="tt-val">R$ ${formatNum(Math.round(inc))}</span></div>
    <div class="tt-row"><span>Densidade</span><span class="tt-val">${dens.toFixed(1)} /km²</span></div>
    <div class="tt-row"><span>Urbanização</span><span class="tt-val">${urbVal.toFixed(0)}%</span></div>
    <div class="tt-row"><span>Potencial</span><span class="tt-val" style="color:var(--ng-orange)">${pot.toFixed(1)} pts</span></div>
    <div class="tt-row"><span>Var. Pop.</span><span class="tt-change ${popCh>=0?'pos':'neg'}">${popCh>=0?'+':''}${popCh.toFixed(1)}%</span></div>
  `;
  L.popup({className:'map-tooltip', closeButton:false, offset:[0,-5]})
    .setLatLng(e.latlng).setContent(content).openOn(map);
}

function showInfoPanel(feature) {
  const d = getFeatureData(feature);
  if(!d) return;
  const val = getMetricValue(d, currentMode, currentYear);
  const change = getMetricChange(d, currentMode, currentYear);
  const pop = projectValue(d.pop, currentYear);
  const inc = projectValue(d.inc, currentYear);
  const hh = projectValue(d.hh, currentYear);
  const pot = calcPotential(d, currentYear);
  document.getElementById('info-name').textContent = getFeatureName(feature);
  document.getElementById('info-stats').innerHTML = `
    <div class="stat"><span class="label">👥 Pop.</span><span class="value">${formatPop(pop)}</span></div>
    <div class="stat"><span class="label">🏠 Domicílios</span><span class="value">${formatPop(hh)}</span></div>
    <div class="stat"><span class="label">💰 PIB p/c</span><span class="value">R$ ${formatNum(Math.round(inc))}</span></div>
    <div class="stat"><span class="label">⭐ Potencial</span><span class="value" style="color:#FF6B00">${pot.toFixed(1)} pts</span></div>
    <div class="stat"><span class="label">📊 ${modeLabels[currentMode]}</span><span class="value">${formatMetric(val, currentMode)}</span></div>
    <div class="stat"><span class="label">Ano</span><span class="value">${currentYear}${currentYear>2022?' (proj.)':''}</span></div>
  `;
  const canDrill = currentLevel !== 'muni';
  document.getElementById('click-hint').textContent = compareMode ? 'Clique para adicionar à comparação' : (canDrill ? 'Clique para explorar →' : '');
  document.getElementById('info-panel').classList.add('visible');
}

function hideInfoPanel() {
  document.getElementById('info-panel').classList.remove('visible');
  map.closePopup();
}

// ========== CLICK / DRILL DOWN ==========
function handleClick(feature, e) {
  if(compareMode) {
    addToCompare(feature);
    return;
  }
  drillDown(feature);
}

function drillDown(feature) {
  const id = getFeatureId(feature);
  const name = getFeatureName(feature);
  const stateId = String(id).substring(0, 2);
  if(currentLevel === 'states') {
    navStack.push({level:'states', id:null, name:'Brasil'});
    renderLevel('meso', stateId, name);
  } else if(currentLevel === 'meso') {
    navStack.push({level:'meso', id:currentParentId, name:'Estado'});
    renderLevel('micro', stateId, name);
  } else if(currentLevel === 'micro') {
    navStack.push({level:'micro', id:currentParentId, name:'Micro'});
    renderLevel('muni', stateId, name);
  }
}

function goBack() {
  if(navStack.length === 0) return;
  const prev = navStack.pop();
  renderLevel(prev.level, prev.id, prev.name);
}

function updateBackButton() {
  document.getElementById('back-btn').style.display = navStack.length > 0 ? 'block' : 'none';
  if(navStack.length > 0) {
    document.getElementById('breadcrumb').style.left = '90px';
  } else {
    document.getElementById('breadcrumb').style.left = '16px';
  }
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const levels = ['Brasil'];
  if(currentLevel !== 'states') levels.push('Mesorregiões');
  if(currentLevel === 'micro' || currentLevel === 'muni') levels.push('Microrregiões');
  if(currentLevel === 'muni') levels.push('Municípios');
  bc.innerHTML = levels.map((l, i) => {
    const isLast = i === levels.length - 1;
    const sep = i > 0 ? '<span class="sep">›</span>' : '';
    return `${sep}<span class="${isLast ? 'active' : ''}" onclick="navigateTo(${i})">${l}</span>`;
  }).join('');
}

function navigateTo(idx) {
  while(navStack.length > idx) goBack();
}

// ========== CONTROLS ==========
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('legend-mode').textContent = modeLabels[mode] || mode;
  // Update legend labels
  const ll = document.getElementById('legend-labels');
  if(mode === 'potential') ll.innerHTML = '<span>0</span><span>25</span><span>50+</span>';
  else if(mode === 'urbanization') ll.innerHTML = '<span>40%</span><span>70%</span><span>100%</span>';
  else ll.innerHTML = '<span>-30%</span><span>0%</span><span>+30%</span>';
  refreshStyles();
  updateRanking();
  updateInsights();
}

function setYear(year) {
  currentYear = parseInt(year);
  document.getElementById('year-display').textContent = currentYear;
  document.getElementById('year-slider').value = currentYear;
  const isCensus = censusYears.includes(currentYear);
  document.getElementById('year-sub').textContent =
    isCensus ? 'Censo IBGE' : currentYear > 2022 ? 'Projeção estimada' : 'Interpolação';
  refreshStyles();
  updateRanking();
  updateInsights();
}

function refreshStyles() {
  if(geoLayer) geoLayer.eachLayer(layer => { if(layer.feature) layer.setStyle(getStyle(layer.feature)); });
}

function togglePlay() {
  playing = !playing;
  const icon = document.getElementById('play-icon');
  if(playing) {
    icon.setAttribute('d', 'M6 4h4v16H6zM14 4h4v16h-4z');
    let y = currentYear < 2052 ? currentYear : 1991;
    playInterval = setInterval(() => { y++; if(y > 2052) { togglePlay(); return; } setYear(y); }, 150);
  } else {
    icon.setAttribute('d', 'M8 5v14l11-7z');
    clearInterval(playInterval);
  }
}

// ========== RANKING PANEL ==========
function updateRanking() {
  if(!geoLayer) return;
  const fltPop = parseFloat(document.getElementById('flt-pop').value) || 0;
  const fltInc = parseFloat(document.getElementById('flt-inc').value) || 0;
  const fltGrowth = parseFloat(document.getElementById('flt-growth').value) || -999;

  const items = [];
  geoLayer.eachLayer(layer => {
    if(!layer.feature) return;
    const d = getFeatureData(layer.feature);
    if(!d) return;
    const pop = projectValue(d.pop, currentYear);
    const inc = projectValue(d.inc, currentYear);
    const popGr = getGrowthRate(d.pop, currentYear, 10);
    if(pop < fltPop) return;
    if(inc < fltInc) return;
    if(popGr < fltGrowth) return;
    const val = getMetricValue(d, currentMode, currentYear);
    const change = getMetricChange(d, currentMode, currentYear);
    const pot = calcPotential(d, currentYear);
    items.push({
      name: getFeatureName(layer.feature),
      val, change, pot, popGr,
      layer, feature: layer.feature
    });
  });

  // Sort by value descending (for potential, by pot; for others, by val)
  if(currentMode === 'potential') items.sort((a,b) => b.pot - a.pot);
  else items.sort((a,b) => b.val - a.val);

  const top = items.slice(0, 20);
  document.getElementById('rank-count').textContent = items.length;

  const list = document.getElementById('rank-list');
  list.innerHTML = top.map((it, i) => `
    <li class="rank-item" onclick="zoomToRank(${i})" data-idx="${i}">
      <span class="rank-num ${i<3?'top3':''}">${i+1}</span>
      <span class="rank-name">${it.name}</span>
      <span class="rank-val">${formatMetric(it.val, currentMode)}</span>
      <span class="rank-growth ${it.popGr>=0?'pos':'neg'}">${it.popGr>=0?'+':''}${it.popGr.toFixed(1)}%</span>
      <span class="rank-score">${it.pot.toFixed(0)}</span>
    </li>
  `).join('');

  // Store for zoom
  window._rankItems = top;
}

function zoomToRank(idx) {
  const item = window._rankItems?.[idx];
  if(!item || !item.layer) return;
  const bounds = item.layer.getBounds();
  map.fitBounds(bounds, {padding: [100,100], animate: true, duration: 0.6});
  item.layer.setStyle(getHighlightStyle());
  setTimeout(() => { if(geoLayer) geoLayer.resetStyle(item.layer); }, 2000);
}

// ========== COMPARISON ==========
function toggleCompareMode() {
  compareMode = !compareMode;
  document.getElementById('compare-toggle').classList.toggle('primary', compareMode);
  document.getElementById('compare-toggle').textContent = compareMode ? '✕ Sair Comparação' : '⚖️ Comparar';
  document.getElementById('comparison').classList.toggle('visible', compareMode || compareList.length > 0);
  if(!compareMode && compareList.length === 0) document.getElementById('comparison').classList.remove('visible');
}

function addToCompare(feature) {
  if(compareList.length >= 3) { compareList.shift(); }
  const d = getFeatureData(feature);
  if(!d) return;
  compareList.push({name: getFeatureName(feature), data: d});
  document.getElementById('comparison').classList.add('visible');
  renderComparison();
}

function removeCompare(idx) {
  compareList.splice(idx, 1);
  renderComparison();
  if(compareList.length === 0) document.getElementById('comparison').classList.remove('visible');
}

function renderComparison() {
  const grid = document.getElementById('compare-grid');
  grid.innerHTML = compareList.map((c, i) => {
    const d = c.data;
    const pop = projectValue(d.pop, currentYear);
    const hh = projectValue(d.hh, currentYear);
    const inc = projectValue(d.inc, currentYear);
    const pot = calcPotential(d, currentYear);
    const popGr = getGrowthRate(d.pop, currentYear, 10);
    const hhGr = getGrowthRate(d.hh, currentYear, 10);
    // Mini sparkline via canvas
    return `
      <div class="compare-card">
        <span class="compare-remove" onclick="removeCompare(${i})">✕</span>
        <h4>${c.name}</h4>
        <div class="cstat"><span>Pop.</span><span class="cv">${formatPop(pop)}</span></div>
        <div class="cstat"><span>Domicílios</span><span class="cv">${formatPop(hh)}</span></div>
        <div class="cstat"><span>PIB p/c</span><span class="cv">R$${formatNum(Math.round(inc))}</span></div>
        <div class="cstat"><span>Potencial</span><span class="cv" style="color:#FF6B00">${pot.toFixed(1)}</span></div>
        <div class="cstat"><span>Cresc. Pop 10a</span><span class="cv ${popGr>=0?'positive':'negative'}">${popGr>=0?'+':''}${popGr.toFixed(1)}%</span></div>
        <div class="cstat"><span>Cresc. Dom 10a</span><span class="cv ${hhGr>=0?'positive':'negative'}">${hhGr>=0?'+':''}${hhGr.toFixed(1)}%</span></div>
        <canvas id="spark-${i}" width="150" height="50"></canvas>
      </div>`;
  }).join('');
  // Draw sparklines
  compareList.forEach((c, i) => {
    const canvas = document.getElementById(`spark-${i}`);
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0,0,w,h);
    const years = [];
    for(let y=1991; y<=2042; y+=1) years.push(y);
    const vals = years.map(y => projectValue(c.data.pop, y));
    const mn = Math.min(...vals), mx = Math.max(...vals);
    ctx.strokeStyle = '#FF6B00';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    years.forEach((y, j) => {
      const x = (j / (years.length-1)) * w;
      const yy = h - ((vals[j] - mn) / (mx - mn || 1)) * (h - 4) - 2;
      j === 0 ? ctx.moveTo(x, yy) : ctx.lineTo(x, yy);
    });
    ctx.stroke();
    // Mark current year
    const ci = currentYear - 1991;
    if(ci >= 0 && ci < years.length) {
      const cx = (ci / (years.length-1)) * w;
      const cy = h - ((vals[ci] - mn) / (mx - mn || 1)) * (h - 4) - 2;
      ctx.fillStyle = '#FF6B00';
      ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI*2); ctx.fill();
    }
  });
}

// ========== INSIGHTS ==========
function updateInsights() {
  if(currentLevel !== 'states') {
    document.getElementById('insights-text').innerHTML = '<em>Insights disponíveis no nível estadual</em>';
    return;
  }
  // Rank states by potential
  const ranked = Object.entries(stateData).map(([id, d]) => ({
    id, name: d.name, uf: d.uf,
    pot: calcPotential(d, currentYear),
    popGr: getGrowthRate(d.pop, currentYear, 10),
    hhGr: getGrowthRate(d.hh, currentYear, 10),
    incGr: getGrowthRate(d.inc, currentYear, 10),
    pop: projectValue(d.pop, currentYear),
    hh: projectValue(d.hh, currentYear),
    urb: projectValue(d.urb, currentYear)
  })).sort((a,b) => b.pot - a.pot);

  const top5 = ranked.slice(0, 5);
  const highGrowthLowDensity = ranked.filter(r => r.popGr > 5 && r.pop < 5000).slice(0, 3);

  let html = `<strong>🏆 Top 5 — Maior Potencial (próx. 10 anos):</strong><br>`;
  top5.forEach((r, i) => {
    html += `${i+1}. <strong>${r.name}</strong> (${r.uf}) — ${r.pot.toFixed(1)} pts | +${r.hhGr.toFixed(1)}% domicílios<br>`;
  });

  if(highGrowthLowDensity.length > 0) {
    html += `<br><strong>🎯 Oportunidades (alto crescimento + mercado em expansão):</strong><br>`;
    highGrowthLowDensity.forEach(r => {
      html += `• <strong>${r.name}</strong> — Pop. cresc. +${r.popGr.toFixed(1)}%, ${r.urb.toFixed(0)}% urbano<br>`;
    });
  }

  html += `<br><strong>🏠 Maior crescimento de domicílios:</strong> `;
  const topHH = [...ranked].sort((a,b) => b.hhGr - a.hhGr).slice(0, 3);
  html += topHH.map(r => `${r.uf} (+${r.hhGr.toFixed(1)}%)`).join(', ');

  document.getElementById('insights-text').innerHTML = html;
}

// ========== EXPORT CSV ==========
function exportCSV() {
  if(!geoLayer) return;
  const rows = [['Região','População','Domicílios','PIB_per_capita','Densidade_km2','Urbanização_%','Potencial','Cresc_Pop_10a_%','Cresc_Dom_10a_%','Ano']];
  geoLayer.eachLayer(layer => {
    if(!layer.feature) return;
    const d = getFeatureData(layer.feature);
    if(!d) return;
    const name = getFeatureName(layer.feature);
    const pop = projectValue(d.pop, currentYear);
    const hh = projectValue(d.hh, currentYear);
    const inc = projectValue(d.inc, currentYear);
    const dens = d.area ? (pop * 1000 / d.area) : 0;
    const urb = projectValue(d.urb, currentYear);
    const pot = calcPotential(d, currentYear);
    const popGr = getGrowthRate(d.pop, currentYear, 10);
    const hhGr = getGrowthRate(d.hh, currentYear, 10);
    rows.push([name, Math.round(pop*1000), Math.round(hh*1000), Math.round(inc), dens.toFixed(2), urb.toFixed(1), pot.toFixed(2), popGr.toFixed(2), hhGr.toFixed(2), currentYear]);
  });
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff' + csv], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `brasil_bi_${currentLevel}_${currentYear}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ========== PANEL TOGGLE ==========
function togglePanel() {
  panelCollapsed = !panelCollapsed;
  document.getElementById('right-panel').classList.toggle('collapsed', panelCollapsed);
  document.getElementById('panel-toggle').textContent = panelCollapsed ? '▶' : '◀';
  setTimeout(() => map.invalidateSize(), 350);
}

// ========== FORMATTING ==========
function formatPop(v) {
  if(v >= 1000) return (v/1000).toFixed(v >= 10000 ? 1 : 2) + ' mi';
  return Math.round(v) + ' mil';
}
function formatNum(v) { return Math.round(v).toLocaleString('pt-BR'); }

// ========== TIMELINE TICKS ==========
function buildTicks() {
  const container = document.getElementById('tick-marks');
  const keyYears = [1991, 2000, 2010, 2022, 2030, 2040, 2052];
  container.innerHTML = keyYears.map(y => {
    const cls = censusYears.includes(y) ? 'census' : (y > 2022 ? 'projected' : '');
    return `<span class="${cls}" onclick="setYear(${y})">${y}</span>`;
  }).join('');
}

// ========== LOADING ==========
function showLoading() { document.getElementById('loading').classList.remove('hidden'); }
function hideLoading() { document.getElementById('loading').classList.add('hidden'); }
function setProgress(t) { document.getElementById('load-progress').textContent = t; }

// ========== INIT ==========
async function init() {
  initMap();
  buildTicks();
  document.getElementById('year-slider').addEventListener('input', (e) => setYear(e.target.value));
  await renderLevel('states', null, 'Brasil');
  setYear(2022);
}

init();
</script>
